[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
skip = [
    { name = "getrandom", version = "0.2" },
    { name = "heck", version = "0.4" },
    { name = "windows-sys", version = "0.52" },
]

[advisories]
ignore = [
    # proc-macro-error2 is unmaintained, pulled in transitively via
    # sea-bae -> sea-orm-macros -> sea-orm. No safe upgrade is available;
    # remove once sea-orm drops the dependency.
    "RUSTSEC-2026-0173",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
