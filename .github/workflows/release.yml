name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver version to publish (e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run — skip publish and GitHub Release creation"
        required: true
        type: boolean
        default: false

