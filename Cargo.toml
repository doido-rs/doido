[workspace]
resolver = "2"
members = [
    "doido-core",
    "doido-config",
    "doido-controller-macros",
    "doido-controller",
    "doido-view",
    "doido-model",
    "doido-middleware",
    "doido-cache",
    "doido-jobs-macros",
    "doido-jobs",
    "doido-mailer-macros",
    "doido-mailer",
    "doido-cable-macros",
    "doido-cable",
    "doido-kafka-macros",
    "doido-kafka",
    "doido-mcp-macros",
    "doido-mcp",
    "doido-generators",
    "doido-cli",
    "doido",
]

[workspace.package]
version = "0.1.0"
license = "MIT"

[workspace.dependencies]
# ORM
sea-orm     = { version = "2.0.0-rc.38", features = ["sqlx-sqlite", "runtime-tokio-rustls", "macros"] }

# Async runtime
tokio       = { version = "1", features = ["rt-multi-thread", "macros"] }
async-trait = "0.1"

# Web
axum        = "0.8"
tower       = { version = "0.5", features = ["util"] }
tower-http  = { version = "0.6", features = ["cors", "trace", "catch-panic"] }
http        = "1"
http-body-util = "0.1"

# Serialization
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"

# Proc-macro helpers
syn         = { version = "2", features = ["full"] }
quote       = "1"
proc-macro2 = "1"

# Observability
tracing     = "0.1"

# Utilities
uuid        = { version = "1", features = ["v4"] }
clap        = { version = "4", features = ["derive"] }
chrono      = { version = "0.4", features = ["clock"] }
