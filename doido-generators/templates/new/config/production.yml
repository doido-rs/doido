server:
  bind: 0.0.0.0
  port: 8080
database:
  # The password below is a CHANGE_ME placeholder — never commit real
  # production credentials. Override with a full connection string at deploy
  # time via the DATABASE__URL environment variable (SECTION__KEY overrides
  # config.database.url).
  url: {doido_db_url_production}
logger:
  # Quieter logging in production. Override at deploy time with RUST_LOG.
  level: info
  # Structured access logs: one JSON line per response (status, latency_ms,
  # request_id). Override at deploy time with RUST_LOG if you need more.
  format: json_response
cache:
  # Distributed cache for production. Switch to redis/memcache by adding the
  # matching feature to the `doido` dependency and pointing `endpoint` at your
  # server (override per environment with the CACHE__ENDPOINT env var).
  #
  # Redis — doido = { ..., features = ["cache-redis"] }
  #   type: redis
  #   endpoint: redis://127.0.0.1:6379
  #   namespace: {doido_name}
  #
  # Memcached — doido = { ..., features = ["cache-memcache"] }
  #   type: memcache
  #   endpoint: memcache://127.0.0.1:11211
  #   namespace: {doido_name}
  type: memory
