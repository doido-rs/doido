[package]
name = "doido-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "doido"
path = "src/main.rs"

[dependencies]
doido-core = { path = "../doido-core" }
doido-generators = { path = "../doido-generators" }
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
